<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Aurelyn — Engineering interfaces that ship</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Bebas+Neue&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#0a0a0b;
    --ink:#ededed;
    --ink-dim:#9a9a9d;
    --line:rgba(255,255,255,0.08);
    --red:#ff2a1f;
    --red-deep:#c8160c;
    --red-glow:#ff5b3a;
    --accent:#ff2a1f;
    --display: "Archivo Black", "Bebas Neue", Impact, sans-serif;
    --condensed: "Bebas Neue", Impact, sans-serif;
    --sans: "Inter Tight", system-ui, -apple-system, sans-serif;
    --mono: "JetBrains Mono", ui-monospace, monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  body{overflow-x:hidden}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}
  ::selection{background:var(--red);color:#fff}

  /* Custom cursor */
  .cursor-dot, .cursor-ring{
    position:fixed;top:0;left:0;pointer-events:none;z-index:9999;
    transform:translate3d(-100px,-100px,0);will-change:transform;
    mix-blend-mode:difference;
  }
  .cursor-dot{width:6px;height:6px;border-radius:50%;background:#fff;margin-left:-3px;margin-top:-3px;transition:transform .12s ease, width .2s, height .2s;}
  .cursor-ring{width:36px;height:36px;border:1px solid rgba(255,255,255,.65);border-radius:50%;margin-left:-18px;margin-top:-18px;transition:width .25s cubic-bezier(.2,.8,.2,1),height .25s cubic-bezier(.2,.8,.2,1),background .2s,border-color .2s}
  body.cursor-hover .cursor-ring{width:64px;height:64px;margin-left:-32px;margin-top:-32px;background:rgba(255,42,31,.18);border-color:var(--red)}
  body.cursor-press .cursor-ring{width:24px;height:24px;margin-left:-12px;margin-top:-12px}
  body.cursor-text .cursor-ring{width:4px;height:28px;border-radius:2px;margin-left:-2px;margin-top:-14px;background:#fff}
  body.cursor-text .cursor-dot{opacity:0}

  /* Scroll progress */
  .scroll-progress{position:fixed;top:0;left:0;height:2px;background:var(--red);width:0%;z-index:200;transition:width .05s linear;box-shadow:0 0 12px var(--red)}

  /* Page transition curtain */
  .curtain{position:fixed;inset:0;background:#0a0a0b;z-index:300;pointer-events:none;display:flex;align-items:center;justify-content:center}
  .curtain[data-state="hidden"]{transform:translateY(-101%);transition:transform .9s cubic-bezier(.7,0,.2,1)}
  .curtain-mark{font-family:var(--display);font-size:14vw;line-height:.85;letter-spacing:-.04em;color:var(--red);opacity:.95}

  /* Section spacing */
  section{position:relative;padding:140px 6vw}
  @media (max-width:780px){ section{padding:90px 5vw} }

  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-dim);display:inline-flex;align-items:center;gap:10px}
  .eyebrow::before{content:"";width:6px;height:6px;background:var(--red);border-radius:50%;box-shadow:0 0 12px var(--red)}

  .hairline{height:1px;background:var(--line);width:100%}

  .reveal{opacity:0;transform:translateY(28px);transition:opacity .9s cubic-bezier(.2,.8,.2,1),transform .9s cubic-bezier(.2,.8,.2,1)}
  .reveal.in{opacity:1;transform:none}
  .reveal-stagger > *{opacity:0;transform:translateY(28px);transition:opacity .9s cubic-bezier(.2,.8,.2,1),transform .9s cubic-bezier(.2,.8,.2,1)}
  .reveal-stagger.in > *{opacity:1;transform:none}
  .reveal-stagger.in > *:nth-child(1){transition-delay:.05s}
  .reveal-stagger.in > *:nth-child(2){transition-delay:.12s}
  .reveal-stagger.in > *:nth-child(3){transition-delay:.19s}
  .reveal-stagger.in > *:nth-child(4){transition-delay:.26s}
  .reveal-stagger.in > *:nth-child(5){transition-delay:.33s}
  .reveal-stagger.in > *:nth-child(6){transition-delay:.4s}

  /* Magnetic button base */
  .mag{display:inline-flex;align-items:center;gap:14px;padding:18px 28px;border:1px solid rgba(255,255,255,.18);background:#fff;color:#0a0a0b;font-family:var(--mono);font-size:12px;letter-spacing:.18em;text-transform:uppercase;font-weight:600;will-change:transform;transition:background .25s,color .25s,border-color .25s;position:relative;overflow:hidden}
  .mag .mag-inner{display:inline-flex;align-items:center;gap:14px;will-change:transform}
  .mag.dark{background:#0a0a0b;color:#fff;border-color:rgba(255,255,255,.18)}
  .mag.red{background:var(--red);color:#fff;border-color:var(--red)}
  .mag .arrow{display:inline-block;width:14px;height:14px;border-right:2px solid currentColor;border-top:2px solid currentColor;transform:rotate(45deg);transition:transform .3s}
  .mag:hover .arrow{transform:rotate(45deg) translate(2px,-2px)}

  /* Marquee */
  .marquee{overflow:hidden;border-top:1px solid var(--line);border-bottom:1px solid var(--line);background:#0a0a0b}
  .marquee-track{display:flex;gap:80px;padding:28px 0;white-space:nowrap;animation:scroll-x 15s linear infinite;font-family:var(--display);font-size:64px;line-height:1;letter-spacing:-.02em;text-transform:uppercase}
  .marquee-track span{display:inline-flex;align-items:center;gap:80px}
  .marquee-track .dot{width:14px;height:14px;border-radius:50%;background:var(--red);display:inline-block;flex:0 0 auto}
  .marquee-track .o{color:transparent;-webkit-text-stroke:2px #fff}
  @keyframes scroll-x{from{transform:translateX(0)}to{transform:translateX(-50%)}}

  /* Layout helpers */
  .container{max-width:1480px;margin:0 auto}
  .row{display:flex;align-items:flex-start;gap:48px}
  .col{flex:1}

  /* Lang switch */
  .langswitch{display:inline-flex;border:1px solid rgba(255,255,255,.18);border-radius:999px;overflow:hidden;font-family:var(--mono);font-size:11px;letter-spacing:.16em}
  .langswitch button{padding:8px 14px;color:rgba(255,255,255,.7);background:transparent;text-transform:uppercase;transition:background .2s,color .2s}
  .langswitch button.active{background:#fff;color:#0a0a0b}

  /* Top nav */
  .nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:22px 4vw;mix-blend-mode:difference}
  .nav .brand{font-family:var(--display);font-size:18px;letter-spacing:.04em;color:#fff}
  .nav .brand .pulse{display:inline-block;width:8px;height:8px;background:var(--red);border-radius:50%;margin-right:10px;vertical-align:middle;animation:pulse 1.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:.5}}
  .nav-links{display:flex;gap:28px;font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#fff}
  .nav-links a{position:relative;padding:6px 0}
  .nav-links a::after{content:"";position:absolute;left:0;bottom:0;width:0;height:1px;background:#fff;transition:width .35s cubic-bezier(.2,.8,.2,1)}
  .nav-links a:hover::after{width:100%}
  @media (max-width:900px){.nav-links{display:none}}

  /* Generic */
  .h-display{font-family:var(--display);text-transform:uppercase;line-height:.88;letter-spacing:-.025em}
  .h-mono{font-family:var(--mono);text-transform:uppercase;letter-spacing:.18em;font-size:12px;color:var(--ink-dim)}

  /* footer */
  footer{padding:80px 6vw 40px}
  .footer-mark{font-family:var(--display);font-size:clamp(80px, 22vw, 360px);letter-spacing:-.04em;line-height:.8;text-transform:uppercase;color:#fff;margin-top:40px;display:block;text-align:center}

  /* utility */
  .glow-red{text-shadow:0 0 40px rgba(255,42,31,.6)}
  .stripe-bg{
    background-image: repeating-linear-gradient(90deg, rgba(255,255,255,.06) 0 1px, transparent 1px 80px);
  }

    html {
    /* Для Firefox */
    scrollbar-width: thin;
    scrollbar-color: var(--red) var(--bg);
  }

  /* Для Chrome, Edge, Safari */
  ::-webkit-scrollbar {
    width: 8px; /* толщина вертикального скролла */
    height: 8px; /* толщина горизонтального скролла */
  }

  ::-webkit-scrollbar-track {
    background: var(--bg); /* темный фон дорожки из твоей темы */
  }

  ::-webkit-scrollbar-thumb {
    background: var(--red); /* фирменный красный ползунок */
    border-radius: 4px; /* скругленные края */
  }

  ::-webkit-scrollbar-thumb:hover {
    background: var(--red-glow); /* светящийся красный при наведении */
  }

  /* No-JS fallback */
  noscript .nojs{display:block;padding:60px;text-align:center;font-family:var(--mono)}
</style>
</head>
<body>
  <div class="curtain" id="curtain"><div class="curtain-mark">AURELYN</div></div>
  <div class="scroll-progress" id="scrollProgress"></div>
  <!-- <div class="cursor-ring"></div>
  <div class="cursor-dot"></div> -->

  <div id="root"></div>

  <noscript><div class="nojs">Aurelyn — please enable JavaScript.</div></noscript>

  <!-- React -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>

  <!-- Cursor + scroll progress -->
  <script src="cursor.js"></script>

  <!-- App modules -->
  <script src="build/i18n.js"></script>
  <script src="build/primitives.js"></script>
  <script src="build/hero.js"></script>
  <script src="build/sections.js"></script>
  <script src="build/tweaks-panel.js"></script>
  <script src="build/app.js"></script>
</body>
</html>
